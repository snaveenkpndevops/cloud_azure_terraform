              echo "QUANTAM_WEB_TRACKER_USER_KEY=$PROD_QUANTAM_WEB_TRACKER_USER_KEY"         >> $GITHUB_ENV
              echo "QUANTAM_WEB_IF_UBH=$PROD_QUANTAM_WEB_IF_UBH"                             >> $GITHUB_ENV
              echo "QUANTAM_WEB_NAS_USERNAME=$PROD_QUANTAM_WEB_NAS_USERNAME"                 >> $GITHUB_ENV
              echo "QUANTAM_WEB_NAS_PASSWORD=$PROD_QUANTAM_WEB_NAS_PASSWORD"                 >> $GITHUB_ENV
              echo "QUANTAM_WEB_TIME_TRACKER_URI=$PROD_QUANTAM_WEB_TIME_TRACKER_URI"         >> $GITHUB_ENV
              echo "QUANTAM_WEB_QUANTAM2_URL=$PROD_QUANTAM_WEB_QUANTAM2_URL"                 >> $GITHUB_ENV
              # Medicaappservice variables
              echo "MEDICA_DB_SERVER=$PROD_MEDICA_DB_SERVER"           >> $GITHUB_ENV
              echo "MEDICA_DB_NAME=$PROD_MEDICA_DB_NAME"               >> $GITHUB_ENV
              echo "MEDICA_DB_USER=$PROD_MEDICA_DB_USER"               >> $GITHUB_ENV
              echo "MEDICA_DB_PASSWORD=$PROD_MEDICA_DB_PASSWORD"       >> $GITHUB_ENV
              echo "MEDICA_NAS_USER=$PROD_MEDICA_NAS_USER"             >> $GITHUB_ENV
              echo "MEDICA_NAS_PASSWORD=$PROD_MEDICA_NAS_PASSWORD"     >> $GITHUB_ENV
              echo "APPSVC_WEBTRAX_CONN=$PROD_APPSVC_WEBTRAX_CONN"                 >> $GITHUB_ENV
