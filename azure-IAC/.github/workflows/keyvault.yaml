              echo "QUANTAM_WEB_CONN_STR_AGATE=$PROD_QUANTAM_WEB_CONN_STR_AGATE"             >> $GITHUB_ENV
              echo "QUANTAM_WEB_FCRMIDAS_CONN=$PROD_QUANTAM_WEB_FCRMIDAS_CONN"               >> $GITHUB_ENV
              echo "QUANTAM_WEB_IFALLS_UBH_CONN=$PROD_QUANTAM_WEB_IFALLS_UBH_CONN"           >> $GITHUB_ENV
