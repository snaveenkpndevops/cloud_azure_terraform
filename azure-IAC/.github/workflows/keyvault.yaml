              echo "TRACKINGAPI_API_KEY_0=$PROD_TRACKINGAPI_API_KEY_0"       >> $GITHUB_ENV
              echo "TRACKINGAPI_API_KEY_1=$PROD_TRACKINGAPI_API_KEY_1"       >> $GITHUB_ENV
              echo "TRACKINGAPI_API_KEY_2=$PROD_TRACKINGAPI_API_KEY_2"       >> $GITHUB_ENV
