              echo "APPSVC_SNOWFLAKE_CONN=$PROD_APPSVC_SNOWFLAKE_CONN"             >> $GITHUB_ENV
              echo "APPSVC_SNOWFLAKE_RSA_KEY=$PROD_APPSVC_SNOWFLAKE_RSA_KEY"       >> $GITHUB_ENV
              echo "APPSVC_NAS_USER=$PROD_APPSVC_NAS_USER"                         >> $GITHUB_ENV
              echo "APPSVC_NAS_PASSWORD=$PROD_APPSVC_NAS_PASSWORD"                 >> $GITHUB_ENV
              echo "APPSVC_NICE_USERNAME=$PROD_APPSVC_NICE_USERNAME"               >> $GITHUB_ENV
              echo "APPSVC_NICE_PASSWORD=$PROD_APPSVC_NICE_PASSWORD"               >> $GITHUB_ENV
              echo "APPSVC_NICE_BASIC_AUTH_TOKEN=$PROD_APPSVC_NICE_BASIC_AUTH_TOKEN" >> $GITHUB_ENV
              # Non-sensitive quantam-web values are now plain vars in tfvars (no env mapping needed)
              ;;
          esac
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      # -------------------------------------------------------
      # quantam2_0 → kv-qtm2-centralus-{env}
      # Secrets seeded from QUANTAM2_* env vars (resolved above)
      # -------------------------------------------------------
      - name: Seed Secrets - quantam2_0 (kv-qtm2-centralus-${{ env.ENVIRONMENT }})
        if: ${{ github.event.inputs.webapp == 'quantam2_0' || github.event.inputs.webapp == 'all' }}
        env:
          _KV:           ${{ env.KV_QUANTAM2_0 }}
          _DB_USER:      ${{ env.QUANTAM2_DB_USER }}
          _DB_PWD:       ${{ env.QUANTAM2_DB_PWD }}
          _DB_SERVER:    ${{ env.QUANTAM2_DB_SERVER }}
          _DB_NAME:      ${{ env.QUANTAM2_DB_NAME }}
          _NAS_URL:      ${{ env.QUANTAM2_NAS_ENDPOINT_URL }}
          _NAS_USER:     ${{ env.QUANTAM2_NAS_USER_ID }}
          _NAS_PASS:     ${{ env.QUANTAM2_NAS_USER_PASSWORD }}
          _NAS_PATH:     ${{ env.QUANTAM2_NAS_BASE_PATH }}
          _API_NAS_URL:  ${{ env.QUANTAM2_QUANTAM_API_NAS_URL }}
          _SNOW_KEY:     ${{ env.QUANTAM2_SNOW_FLAKE_KEY }}
          _FALLBACK_EMAIL: ${{ env.QUANTAM2_FALLBACK_APPROVER_EMAIL }}
          _SQL_TIMEOUT:  ${{ env.QUANTAM2_SQL_REQUEST_TIMEOUT }}
        run: |
          KV="$_KV"
          echo "Seeding secrets into: $KV"
          # Helper: skip secrets with empty values (GitHub secret not yet set)
          kv_set() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "SKIP: $name (empty — GitHub secret not set)"
            else
              az keyvault secret set --vault-name "$KV" --name "$name" --value "$value"
            fi
          }
          kv_set "DB-USER"                 "$_DB_USER"
          kv_set "DB-PWD"                  "$_DB_PWD"
          kv_set "DB-SERVER"               "$_DB_SERVER"
          kv_set "DB-NAME"                 "$_DB_NAME"
          kv_set "NAS-ENDPOINT-URL"        "$_NAS_URL"
          kv_set "NAS-USER-ID"             "$_NAS_USER"
          kv_set "NAS-USER-PASSWORD"       "$_NAS_PASS"
          kv_set "NAS-BASE-PATH"           "$_NAS_PATH"
          kv_set "QUANTAM-API-NAS-URL"     "$_API_NAS_URL"
          kv_set "Snow-Flake-Key"          "$_SNOW_KEY"
          kv_set "FALLBACK-APPROVER-EMAIL" "$_FALLBACK_EMAIL"
          kv_set "Sql-Request-Timeout"     "$_SQL_TIMEOUT"
          echo "Done seeding $KV"
      # -------------------------------------------------------
      # quantam → kv-qtmweb-centralus-{env}
      # Secrets seeded from QUANTAM_WEB_* env vars (resolved above)
      # -------------------------------------------------------
      - name: Seed Secrets - quantam (kv-qtmweb-centralus-${{ env.ENVIRONMENT }})
        if: ${{ github.event.inputs.webapp == 'quantam' || github.event.inputs.webapp == 'all' }}
        env:
          _KV:              ${{ env.KV_QUANTAM }}
          _CONN_STR:        ${{ env.QUANTAM_WEB_CONN_STR }}
          _CMCFACETS_CONN:  ${{ env.QUANTAM_WEB_CONN_STR_FACETS }}
          _AGATE_CONN:      ${{ env.QUANTAM_WEB_CONN_STR_AGATE }}
          _FCRMIDAS_CONN:   ${{ env.QUANTAM_WEB_FCRMIDAS_CONN }}
          _IFALLS_UBH_CONN: ${{ env.QUANTAM_WEB_IFALLS_UBH_CONN }}
          _SQL_SERVER:      ${{ env.QUANTAM_WEB_SQL_SERVER }}
          _TRACKER_KEY:     ${{ env.QUANTAM_WEB_TRACKER_USER_KEY }}
          _IF_UBH:          ${{ env.QUANTAM_WEB_IF_UBH }}
          _NAS_USER:        ${{ env.QUANTAM_WEB_NAS_USERNAME }}
          _NAS_PASS:        ${{ env.QUANTAM_WEB_NAS_PASSWORD }}
        run: |
          KV="$_KV"
          echo "Seeding secrets into: $KV"
          # Helper: skip secrets with empty values (GitHub secret not yet set)
          kv_set() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "SKIP: $name (empty — GitHub secret not set)"
            else
              az keyvault secret set --vault-name "$KV" --name "$name" --value "$value"
            fi
          }
          # Connection strings (contain passwords — always KV)
          kv_set "WebTrax-ConnectionString"    "$_CONN_STR"
          kv_set "CMCFacets-ConnectionString"  "$_CMCFACETS_CONN"
          kv_set "Agate-ConnectionString"      "$_AGATE_CONN"
          kv_set "FCR-MIDAS-ConnectionString"  "$_FCRMIDAS_CONN"
          kv_set "Ifalls-UBH-ConnectionString" "$_IFALLS_UBH_CONN"
          # Secrets — credentials / API keys
          kv_set "SQL-Server"        "$_SQL_SERVER"
          kv_set "TrackerUserKey"    "$_TRACKER_KEY"
          kv_set "IF-UBH"            "$_IF_UBH"
          kv_set "NasUploadUsername" "$_NAS_USER"
          kv_set "NasUploadPassword" "$_NAS_PASS"
          # NOTE: SSRS_WTX, SSRS_Prod, OPS2URL, WTXDBEnviroment, ChartImageHandler,
          # DisableEmailEnv, ErrorLogFallbackPath are NON-SENSITIVE — plain vars in tfvars.
          # TimeTrackerUri and Quantam2.0Url are set directly on the webapp below (not KV).
          echo "Done seeding $KV"
      # -------------------------------------------------------
      # Push custom domain URLs directly to quantam-web App Service
      # Values come from GitHub Environment Variables (vars.*)
      # Runs after KV seed so it always overrides Terraform defaults.
      # -------------------------------------------------------
      - name: Update App Settings - quantam-web (custom domain URLs)
        if: ${{ github.event.inputs.webapp == 'quantam' || github.event.inputs.webapp == 'all' }}
        env:
          _TIME_TRACKER: ${{ env.QUANTAM_WEB_TIME_TRACKER_URI }}
          _QTM2_URL:     ${{ env.QUANTAM_WEB_QUANTAM2_URL }}
        run: |
          WEBAPP="ase-quantam-web-${{ env.LOCATION }}-${{ env.ENVIRONMENT }}"
          echo "Resolving resource group for: $WEBAPP"
          RG=$(az webapp list --query "[?name=='$WEBAPP'].resourceGroup" -o tsv)
          if [ -z "$RG" ]; then
            echo "ERROR: Could not find webapp '$WEBAPP' in subscription"
            exit 1
          fi
          echo "Setting app settings on: $WEBAPP (RG: $RG)"
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name "$WEBAPP" \
            --settings \
              "TimeTrackerUri=$_TIME_TRACKER" \
              "Quantam2.0Url=$_QTM2_URL"
          echo "Done updating app settings on $WEBAPP"

      # -------------------------------------------------------
      # trackingapi → kv-qtmtapi-centralus-{env}
      # TODO: add trackingapi-specific secrets when app is configured
      # -------------------------------------------------------
      - name: Seed Secrets - trackingapi (kv-qtmtapi-centralus-${{ env.ENVIRONMENT }})
        if: ${{ github.event.inputs.webapp == 'trackingapi' || github.event.inputs.webapp == 'all' }}
        env:
          _KV:       ${{ env.KV_TRACKINGAPI }}
          _CONN:     ${{ env.TRACKINGAPI_WEBTRAX_CONN }}
          _KEY_0:    ${{ env.TRACKINGAPI_API_KEY_0 }}
          _KEY_1:    ${{ env.TRACKINGAPI_API_KEY_1 }}
          _KEY_2:    ${{ env.TRACKINGAPI_API_KEY_2 }}
        run: |
          KV="$_KV"
          echo "Seeding secrets into: $KV"
          az keyvault secret set --vault-name "$KV" --name "WebTrax-ConnectionString" --value "$_CONN"
          az keyvault secret set --vault-name "$KV" --name "ApiKey-0"                 --value "$_KEY_0"
          az keyvault secret set --vault-name "$KV" --name "ApiKey-1"                 --value "$_KEY_1"
          az keyvault secret set --vault-name "$KV" --name "ApiKey-2"                 --value "$_KEY_2"
          echo "Done seeding $KV"

      # -------------------------------------------------------
      # quantam_appservices -> kv-appsvc-{env}
      # quantamserviceapis secrets and connection strings
      # -------------------------------------------------------
      - name: Seed Secrets - quantam_appservices (kv-appsvc-${{ env.ENVIRONMENT }})
        if: ${{ github.event.inputs.webapp == 'quantam_appservices' || github.event.inputs.webapp == 'all' }}
        env:
          _KV:                     ${{ env.KV_APPSVC }}
          _WEBTRAX_CONN:           ${{ env.APPSVC_WEBTRAX_CONN }}
          _WEBTRAX_STAGE_CONN:     ${{ env.APPSVC_WEBTRAX_STAGE_CONN }}
          _JANUS_CONN:             ${{ env.APPSVC_JANUS_CONN }}
          _NICE_CONN:              ${{ env.APPSVC_NICE_CONN }}
          _FACETS_CONN:            ${{ env.APPSVC_FACETS_CONN }}
          _SNOWFLAKE_CONN:         ${{ env.APPSVC_SNOWFLAKE_CONN }}
          _SNOWFLAKE_RSA_KEY:      ${{ env.APPSVC_SNOWFLAKE_RSA_KEY }}
          _NAS_USER:               ${{ env.APPSVC_NAS_USER }}
          _NAS_PASSWORD:           ${{ env.APPSVC_NAS_PASSWORD }}
          _NICE_USERNAME:          ${{ env.APPSVC_NICE_USERNAME }}
          _NICE_PASSWORD:          ${{ env.APPSVC_NICE_PASSWORD }}
          _NICE_BASIC_AUTH_TOKEN:  ${{ env.APPSVC_NICE_BASIC_AUTH_TOKEN }}
        run: |
          KV="$_KV"
          echo "Seeding secrets into: $KV"
          kv_set() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "SKIP: $name (empty - GitHub secret not set)"
            else
              az keyvault secret set --vault-name "$KV" --name "$name" --value "$value"
            fi
          }
          kv_set "WebTrax-ConnectionString"            "$_WEBTRAX_CONN"
          kv_set "WebTrax-Stage-ConnectionString"      "$_WEBTRAX_STAGE_CONN"
          kv_set "Janus-ConnectionString"              "$_JANUS_CONN"
          kv_set "Nice-ConnectionString"               "$_NICE_CONN"
          kv_set "Facets-ConnectionString"             "$_FACETS_CONN"
          kv_set "SnowflakeHighmark-ConnectionString"  "$_SNOWFLAKE_CONN"
          kv_set "SnoWFlake-Rsa-Key"                   "$_SNOWFLAKE_RSA_KEY"
          kv_set "Nas-User"                            "$_NAS_USER"
          kv_set "Nas-Password"                        "$_NAS_PASSWORD"
          kv_set "Nice-Username"                       "$_NICE_USERNAME"
          kv_set "Nice-Password"                       "$_NICE_PASSWORD"
          kv_set "Nice-Basic-Auth-Token"               "$_NICE_BASIC_AUTH_TOKEN"
          echo "Done seeding $KV"

      # -------------------------------------------------------
      # medicaappservice → kv-medica-{env}
      # Secrets seeded from MEDICA_* env vars (resolved above)
      # -------------------------------------------------------
      - name: Seed Secrets - medicaappservice (kv-medica-${{ env.ENVIRONMENT }})
        if: ${{ github.event.inputs.webapp == 'medicaappservice' || github.event.inputs.webapp == 'all' }}
        env:
          _KV:              ${{ env.KV_MEDICA }}
          _DB_SERVER:       ${{ env.MEDICA_DB_SERVER }}
          _DB_NAME:         ${{ env.MEDICA_DB_NAME }}
          _DB_USER:         ${{ env.MEDICA_DB_USER }}
          _DB_PASSWORD:     ${{ env.MEDICA_DB_PASSWORD }}
          _NAS_USER:        ${{ env.MEDICA_NAS_USER }}
          _NAS_PASSWORD:    ${{ env.MEDICA_NAS_PASSWORD }}
        run: |
          KV="$_KV"
          echo "Seeding secrets into: $KV"
          # Helper: skip secrets with empty values (GitHub secret not yet set)
          kv_set() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "SKIP: $name (empty — GitHub secret not set)"
            else
              az keyvault secret set --vault-name "$KV" --name "$name" --value "$value"
            fi
          }
          # Build connection string — Azure SQL format with encryption & timeouts
          CONN_STR="Server=$_DB_SERVER,1433;Database=$_DB_NAME;User Id=$_DB_USER;Password=$_DB_PASSWORD;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          kv_set "Medica-ConnectionString"  "$CONN_STR"
          # NAS file share credentials (SMTP is anonymous relay — no credentials needed)
          kv_set "NAS-USER"                 "$_NAS_USER"
          kv_set "NAS-PASSWORD"             "$_NAS_PASSWORD"
          echo "Done seeding $KV"
      
