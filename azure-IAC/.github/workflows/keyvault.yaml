              echo "APPSVC_NAS_USER=$STG_APPSVC_NAS_USER"                         >> $GITHUB_ENV
              echo "APPSVC_NAS_PASSWORD=$STG_APPSVC_NAS_PASSWORD"                 >> $GITHUB_ENV
              echo "APPSVC_NICE_USERNAME=$STG_APPSVC_NICE_USERNAME"               >> $GITHUB_ENV
              echo "APPSVC_NICE_PASSWORD=$STG_APPSVC_NICE_PASSWORD"               >> $GITHUB_ENV
              echo "APPSVC_NICE_BASIC_AUTH_TOKEN=$STG_APPSVC_NICE_BASIC_AUTH_TOKEN" >> $GITHUB_ENV
              # Non-sensitive quantam-web values are now plain vars in tfvars (no env mapping needed)
              ;;
            PROD)
              echo "QUANTAM2_DB_USER=$PROD_DB_USER"                                 >> $GITHUB_ENV
              echo "QUANTAM2_DB_PWD=$PROD_DB_PWD"                                   >> $GITHUB_ENV
